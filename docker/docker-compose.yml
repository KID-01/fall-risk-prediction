# ============================================================
# 跌倒风险预测系统 — docker-compose.yml
# 一键启动: docker-compose -f docker/docker-compose.yml up -d
# ============================================================

version: "3.8"

services:
  # ── API 服务 ──
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fall-risk-api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../checkpoints:/app/checkpoints
      - ../logs:/app/logs
      - ../configs:/app/configs
    environment:
      - PYTHONIOENCODING=utf-8
    restart: unless-stopped
    depends_on:
      - redis

  # ── Redis 缓存 ──
  redis:
    image: redis:7-alpine
    container_name: fall-risk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ── Nginx 反向代理 (可选,生产环境) ──
  nginx:
    image: nginx:alpine
    container_name: fall-risk-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../frontend/dist:/usr/share/nginx/html
    restart: unless-stopped
    depends_on:
      - api

volumes:
  redis_data:
